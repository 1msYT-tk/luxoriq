<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUXORIQ — AI Business Agent</title>
<meta name="description" content="LUXORIQ AI Agent — Build websites, automate SEO, generate brands, and scale your business with AI."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<script>
// Auth guard — runs before anything renders
(function(){
  const auth = localStorage.getItem('lx_auth');
  if (!auth) { window.location.replace('login.html'); return; }
  try { const d=JSON.parse(auth); if(!d.email||!d.ts) window.location.replace('login.html'); } catch(e){ window.location.replace('login.html'); }
})();
</script>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" stroke="#00F0FF" stroke-width="1.5" fill="none"/>
        <polygon points="16,8 24,13 24,21 16,26 8,21 8,13" fill="#00F0FF" opacity="0.15"/>
        <circle cx="16" cy="16" r="3" fill="#00F0FF"/>
      </svg>
    </div>
    <span class="logo-text">LUXORIQ</span>
    <span class="logo-badge">AI</span>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-group">
      <span class="nav-group-label">WORKSPACE</span>
      <button class="nav-item active" data-module="overview">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Overview
      </button>
      <button class="nav-item" data-module="website">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="3" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 17h6M10 15v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Website Generator
        <span class="nav-tag">AI</span>
      </button>
      <button class="nav-item" data-module="seo">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        SEO Tools
        <span class="nav-tag">AI</span>
      </button>
      <button class="nav-item" data-module="brand">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M10 2l2 4 5 1-3.5 3.5.8 5L10 14l-4.3 2.5.8-5L3 8l5-1 2-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Brand Studio
        <span class="nav-tag">AI</span>
      </button>
      <button class="nav-item" data-module="chatbot">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M3 4a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H7l-4 3V4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Chatbot Builder
        <span class="nav-tag">AI</span>
      </button>
      <button class="nav-item" data-module="content">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M4 6h12M4 10h8M4 14h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Content Engine
        <span class="nav-tag">AI</span>
      </button>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">MANAGEMENT</span>
      <button class="nav-item" data-module="crm">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 17c0-3.314 2.686-6 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="15" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 18h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M15 15v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        CRM Lite
      </button>
      <button class="nav-item" data-module="assistant">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><polygon points="10,1 13,7 19,8 14.5,13 16,19 10,16 4,19 5.5,13 1,8 7,7" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        AI Assistant
      </button>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="api-key-section">
      <label class="api-label">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M11 1a4 4 0 010 8H9l-1 1H7v1H6v1H4v-2l4-4H7A4 4 0 1111 1z" stroke="#A0A0A0" stroke-width="1.2"/><circle cx="11.5" cy="4.5" r="1" fill="#A0A0A0"/></svg>
        OpenRouter API Key
      </label>
      <input type="password" id="globalApiKey" class="api-input" placeholder="sk-or-v1-..." autocomplete="off" spellcheck="false"/>
      <div id="apiStatus" class="api-status"></div>
      <a href="https://openrouter.ai/keys" target="_blank" class="api-link">Get free key →</a>
    </div>
    <div class="model-section">
      <label class="api-label">Model</label>
      <select id="globalModel" class="model-select">
        <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Free)</option>
        <option value="deepseek/deepseek-chat-v3-0324:free">DeepSeek V3 (Free)</option>
        <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (Free)</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
      </select>
    </div>
  </div>
</aside>

<!-- MOBILE TOPBAR -->
<div class="mobile-topbar">
  <button id="mobileMenuBtn" class="mobile-menu-btn">
    <span></span><span></span><span></span>
  </button>
  <div class="logo-text" style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.08em">LUXORIQ</div>
  <div style="width:40px"></div>
</div>

<!-- MAIN -->
<main id="main">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="topbar-left">
      <div id="moduleTitle" class="module-title">Overview</div>
      <div id="moduleDesc" class="module-desc">Your AI business command center</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-status">
        <span class="status-dot-green"></span>
        <span>AI Online</span>
      </div>
      <div id="userMenu" style="display:flex;align-items:center;gap:10px;margin-left:16px;padding-left:16px;border-left:1px solid rgba(255,255,255,0.07)">
        <div style="text-align:right">
          <div id="userName" style="font-size:0.82rem;font-weight:600;color:#fff"></div>
          <div id="userBiz" style="font-size:0.68rem;color:var(--silver)"></div>
        </div>
        <div id="userAvatar" style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,rgba(0,240,255,0.25),rgba(0,240,255,0.05));border:1px solid rgba(0,240,255,0.25);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#00F0FF;cursor:pointer" title="Sign out" onclick="AUTH_LOGOUT()"></div>
      </div>
    </div>
  </div>

  <!-- MODULE CONTENT -->
  <div id="moduleContent" class="module-content"></div>
</main>

<script src="core.js"></script>
<script src="modules.js"></script>
<script src="app.js"></script>
</body>
</html>
